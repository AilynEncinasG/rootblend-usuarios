services:
  mysql-local:
    image: mysql:8.0
    container_name: rootblend-mysql-local
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - mysql_local_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-sync-cloud-to-local:
    image: mysql:8.0
    container_name: rootblend-db-sync-cloud-to-local
    depends_on:
      mysql-local:
        condition: service_healthy
    env_file:
      - ./.env.sync
    volumes:
      - ./scripts:/scripts
      - ./backups:/backups
    command: sh /scripts/sync-cloud-to-local.sh
    restart: "no"

  db-sync-auto-cloud-to-local:
    image: mysql:8.0
    container_name: rootblend-db-sync-auto-cloud-to-local
    depends_on:
      mysql-local:
        condition: service_healthy
    env_file:
      - ./.env.sync
    environment:
      SYNC_INTERVAL_SECONDS: 300
    volumes:
      - ./scripts:/scripts
      - ./backups:/backups
    command: sh /scripts/sync-cloud-to-local-auto.sh
    restart: unless-stopped

  db-sync-local-to-cloud:
    image: mysql:8.0
    container_name: rootblend-db-sync-local-to-cloud
    profiles:
      - recover
    depends_on:
      mysql-local:
        condition: service_healthy
    env_file:
      - ./.env.sync
    volumes:
      - ./scripts:/scripts
      - ./backups:/backups
    command: sh /scripts/sync-local-to-cloud.sh
    restart: "no"

  rabbitmq:
    build:
      context: ./infra/rabbitmq
    container_name: rootblend-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  media-server:
    image: bluenviron/mediamtx:latest
    container_name: rootblend-media-server
    environment:
      MTX_RTMP: "yes"
      MTX_RTMPADDRESS: ":1935"
      MTX_HLS: "yes"
      MTX_HLSADDRESS: ":8888"
      MTX_WEBRTC: "yes"
      MTX_WEBRTCADDRESS: ":8889"
    ports:
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
    restart: unless-stopped

  usuarios-service:
    build:
      context: ./services/usuarios-service
    container_name: rootblend-usuarios-service
    env_file:
      - ./services/usuarios-service/.env
    environment:
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,gateway,usuarios-service,canales-streaming-service,estadisticas-service,192.168.1.207"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:5173,http://localhost:8080,http://127.0.0.1:5173,http://127.0.0.1:8080,http://192.168.1.207:5173,http://192.168.1.207:8080"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://192.168.1.207:5173"
      FRONTEND_URL: "http://192.168.1.207:5173"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/')\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  canales-streaming-service:
    build:
      context: ./services/canales-streaming-service
    container_name: rootblend-canales-streaming-service
    env_file:
      - ./services/canales-streaming-service/.env
    environment:
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,gateway,usuarios-service,canales-streaming-service,estadisticas-service,192.168.1.207"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:5173,http://localhost:8080,http://127.0.0.1:5173,http://127.0.0.1:8080,http://192.168.1.207:5173,http://192.168.1.207:8080"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://192.168.1.207:5173"
      STREAM_RTMP_SERVER: "rtmp://192.168.1.207:1935/live"
      STREAM_PLAYBACK_BASE_URL: "http://localhost:8080/hls/live"
      STREAM_PLAYBACK_PROBE_BASE_URL: "http://media-server:8888/live"
    ports:
      - "8001:8001"
    depends_on:
      - media-server
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/health/')\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  estadisticas-service:
    build:
      context: ./services/estadisticas-service
    container_name: rootblend-estadisticas-service
    env_file:
      - ./services/estadisticas-service/.env
    environment:
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,gateway,usuarios-service,canales-streaming-service,estadisticas-service,192.168.1.207"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:5173,http://localhost:8080,http://127.0.0.1:5173,http://127.0.0.1:8080,http://192.168.1.207:5173,http://192.168.1.207:8080"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://192.168.1.207:5173"
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/api/health/')\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  podcasts-service:
    build:
      context: ./services/podcasts-service
    container_name: rootblend-podcasts-service
    env_file:
      - ./services/podcasts-service/.env
    environment:
      APP_URL: "http://192.168.1.207:8080"
      FRONTEND_URL: "http://192.168.1.207:5173"
      SANCTUM_STATEFUL_DOMAINS: "localhost:5173,127.0.0.1:5173,192.168.1.207:5173"
      SESSION_DOMAIN: ""
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "php -r \"$$c=@file_get_contents('http://127.0.0.1:8003/api/health'); exit($$c===false?1:0);\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  interacciones-service:
    build:
      context: ./services/interacciones-service
    container_name: rootblend-interacciones-service
    env_file:
      - ./services/interacciones-service/.env
    environment:
      APP_URL: "http://192.168.1.207:8080"
      FRONTEND_URL: "http://192.168.1.207:5173"
      SANCTUM_STATEFUL_DOMAINS: "localhost:5173,127.0.0.1:5173,192.168.1.207:5173"
      SESSION_DOMAIN: ""
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD-SHELL", "php -r \"$$c=@file_get_contents('http://127.0.0.1:8004/api/health'); exit($$c===false?1:0);\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
    container_name: rootblend-gateway
    ports:
      - "8080:80"
    depends_on:
      - usuarios-service
      - canales-streaming-service
      - estadisticas-service
      - podcasts-service
      - interacciones-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/usuarios-health/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: rootblend-frontend
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  mysql_local_data: