        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/interactions-health/ {
        proxy_pass http://interacciones-service:8004/api/health;
        proxy_set_header Host $host;
    }

location /hls/ {
    proxy_pass http://media-server:8888/;
    proxy_http_version 1.1;

    proxy_buffering off;
    proxy_cache off;

    proxy_set_header Host media-server;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_redirect ~^(/live/.*)$ http://localhost:8080/hls$1;
    proxy_redirect ~^http://media-server:8888(/live/.*)$ http://localhost:8080/hls$1;

    types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
    }

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;

    if ($request_method = OPTIONS) {
        return 204;
    }
}
    location /media/ {
        proxy_pass http://usuarios-service:8000/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

}
