server {
    listen 80;
    server_name localhost;

    client_max_body_size 120m;

    location = /health {
        add_header Content-Type text/plain;
        return 200 "gateway ok
";
    }

    location /api/auth/ {
        proxy_pass http://usuarios-service:8000/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/users/ {
        proxy_pass http://usuarios-service:8000/api/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/preferences/ {
        proxy_pass http://usuarios-service:8000/api/preferences/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/usuarios-health/ {
        proxy_pass http://usuarios-service:8000/api/health/;
        proxy_set_header Host $host;
    }

    location /media/ {
        proxy_pass http://usuarios-service:8000/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/streams/ {
        proxy_pass http://canales-streaming-service:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/streams-health/ {
        proxy_pass http://canales-streaming-service:8001/api/health/;
        proxy_set_header Host $host;
    }

    location /canales-media/ {
        proxy_pass http://canales-streaming-service:8001/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/stats/ {
        proxy_pass http://estadisticas-service:8002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/stats-health/ {
        proxy_pass http://estadisticas-service:8002/api/health/;
        proxy_set_header Host $host;
    }

    location /api/podcasts/ {
        proxy_pass http://podcasts-service:8003/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/podcasts-health/ {
        proxy_pass http://podcasts-service:8003/api/health;
        proxy_set_header Host $host;
    }

    location /podcasts-storage/ {
        proxy_pass http://podcasts-service:8003/storage/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/interactions/ {
        proxy_pass http://interacciones-service:8004/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/interactions-health/ {
        proxy_pass http://interacciones-service:8004/api/health;
        proxy_set_header Host $host;
    }

    location /api/payments/ {
        proxy_pass http://pagos-service:8005/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/payments-health/ {
        proxy_pass http://pagos-service:8005/api/health/;
        proxy_set_header Host $host;
    }

    location /hls/ {
        proxy_pass http://media-server:8888/;
        proxy_http_version 1.1;

        proxy_buffering off;
        proxy_cache off;

        proxy_set_header Host media-server;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect ~^(/live/.*)$ http://localhost:8080/hls$1;
        proxy_redirect ~^http://media-server:8888(/live/.*)$ http://localhost:8080/hls$1;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
