server {
    listen 80;
    server_name localhost;

    location /api/auth/ {
        proxy_pass http://host.docker.internal:8000/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/users/ {
        proxy_pass http://host.docker.internal:8000/api/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/preferences/ {
        proxy_pass http://host.docker.internal:8000/api/preferences/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/usuarios-health/ {
        proxy_pass http://host.docker.internal:8000/api/health/;
        proxy_set_header Host $host;
    }

    location /api/streams/ {
        proxy_pass http://host.docker.internal:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/streams-health/ {
        proxy_pass http://host.docker.internal:8001/api/health/;
        proxy_set_header Host $host;
    }

    location /api/stats/ {
        proxy_pass http://host.docker.internal:8002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/stats-health/ {
        proxy_pass http://host.docker.internal:8002/api/health/;
        proxy_set_header Host $host;
    }

    location /api/podcasts/ {
        proxy_pass http://host.docker.internal:8003/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/podcasts-health/ {
        proxy_pass http://host.docker.internal:8003/api/health;
        proxy_set_header Host $host;
    }

    location /api/interactions/ {
        proxy_pass http://host.docker.internal:8004/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/interactions-health/ {
        proxy_pass http://host.docker.internal:8004/api/health;
        proxy_set_header Host $host;
    }
}